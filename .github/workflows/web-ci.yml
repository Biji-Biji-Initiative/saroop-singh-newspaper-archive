name: Web CI

on:
  pull_request:
  push:
    branches:
      - main
      - codex/saroop-coolify-cutover
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-web:
    name: Verify web build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: saroop-singh-archive/packages/web
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: saroop-singh-archive/packages/web/package-lock.json

      - name: Install locked dependencies
        run: npm ci --workspaces=false

      - name: Validate the canonical published article corpus
        run: npm run validate:content

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Build and run the complete archive suite
        env:
          ARCHIVE_DATA_DIR: /tmp/saroop-archive-ci
          NEXT_PUBLIC_SITE_ORIGIN: https://saroop.mereka.dev
          ARCHIVE_PUBLIC_ORIGIN: https://saroop.mereka.dev
        run: npm test

      - name: Build the production Coolify image
        working-directory: .
        run: docker build --tag saroop-archive:ci .

      - name: Reject high-severity production dependency findings
        run: npm audit --omit=dev --audit-level=high
