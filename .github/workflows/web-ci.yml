name: Web CI

on:
  pull_request:
  push:
    branches:
      - main
      - codex/saroop-coolify-cutover

permissions:
  contents: read

jobs:
  verify-web:
    name: Verify web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: saroop-singh-archive/packages/web
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: saroop-singh-archive/packages/web/package-lock.json

      - name: Install locked dependencies
        run: npm ci --ignore-scripts --workspaces=false

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Build production bundle
        run: npm run build

      - name: Reject high-severity production dependency findings
        run: npm audit --omit=dev --audit-level=high
