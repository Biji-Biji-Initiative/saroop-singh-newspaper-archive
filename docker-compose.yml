services:
  archive:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_ORIGIN: https://saroop.mereka.dev
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      ARCHIVE_DATA_DIR: /data
      NEXT_PUBLIC_SITE_ORIGIN: https://saroop.mereka.dev
      ARCHIVE_PUBLIC_ORIGIN: https://saroop.mereka.dev
    expose:
      - "3000"
    restart: unless-stopped
    volumes:
      - archive-data:/data

volumes:
  archive-data:
