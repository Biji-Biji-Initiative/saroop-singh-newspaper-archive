services:
  archive:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      ARCHIVE_DATA_DIR: /data
      ARCHIVE_CONTENT_DIR: /app/saroop-singh-archive/content/articles/published
    expose:
      - "3000"
    restart: unless-stopped
    volumes:
      - archive-data:/data

volumes:
  archive-data:
